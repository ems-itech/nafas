services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - NEXT_TELEMETRY_DISABLED=1
    volumes:
      - ./:/app
      - web_node_modules:/app/node_modules
      - web_next_cache:/app/.next

volumes:
  web_node_modules:
  web_next_cache:

